name: speak_reader
description: 语音朗读导入 App —— 拍照/扫描/Word/PDF/TXT 导入并语音朗读
publish_to: 'none'
version: 2.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 语音朗读(系统内置 TTS)
  flutter_tts: ^4.0.2

  # 拍照 / 相册取图
  image_picker: ^1.1.2

  # 选择文件(docx/pdf/txt)
  file_picker: ^8.1.2

  # Word(.docx)转文本
  docx_to_text: ^1.0.1

  # PDF 文本提取
  syncfusion_flutter_pdf: ^27.1.48

  # 运行时权限
  permission_handler: ^11.3.1

  # 历史记录本地持久化
  shared_preferences: ^2.3.2

  # 网络请求(翻译 API)
  http: ^1.2.2

  # 文件目录(音频导出输出路径)
  path_provider: ^2.1.4

  # 分享/打开生成的音频文件
  # 需 >=10.0.1 才依赖 web ^1.0.0(与 file_picker 兼容);
  # 又需 <12.0.0 避免强制 AGP>=8.12/Kotlin2.2 拖累 CI。
  share_plus: ^10.1.0

  # 跳转系统 TTS 声音数据安装页(缺声音时引导下载)
  android_intent_plus: ^5.0.0

  # 离线文字识别(Google ML Kit,与离线翻译同源,免 key、离线)
  google_mlkit_text_recognition: ^0.13.0

  # 离线翻译(Google ML Kit,首次需联网下载语言模型,之后离线)
  google_mlkit_translation: ^0.13.0
  google_mlkit_language_id: ^0.13.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
