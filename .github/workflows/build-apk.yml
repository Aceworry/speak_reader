name: Build Android APK

# 手动触发,或推送到 main 分支时自动打包
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 补齐脚手架文件(图标/wrapper/gradle 等)
        run: flutter create --org com.example --project-name speak_reader --platforms=android .

      - name: 还原自定义配置(依赖、权限、业务代码)
        run: |
          git checkout -- pubspec.yaml \
            android/app/src/main/AndroidManifest.xml \
            lib
          rm -f test/widget_test.dart 2>/dev/null || true

      - name: 调整 app 构建配置(compileSdk 36 + 关闭混淆)
        run: |
          F=android/app/build.gradle.kts
          echo "===== 原始 build.gradle.kts ====="
          cat "$F"
          # 宽松匹配 compileSdk 的多种写法(= 34 / = flutter.compileSdkVersion / 函数式)
          sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[A-Za-z0-9._()]+/compileSdk = 36/' "$F"
          sed -i -E 's/compileSdkVersion[[:space:]]*\([^)]*\)/compileSdk = 36/' "$F"
          # 关闭 R8 混淆与资源压缩(避免 ML Kit 类缺失);已存在则不重复插入
          grep -q "isMinifyEnabled" "$F" || \
            sed -i '/signingConfig = signingConfigs.getByName("debug")/a\            isMinifyEnabled = false\n            isShrinkResources = false' "$F"
          echo "===== 修改后 build.gradle.kts ====="
          cat "$F"
          echo "===== 校验 compileSdk ====="
          if grep -qE "compileSdk[[:space:]]*=[[:space:]]*36" "$F"; then
            echo "OK: compileSdk 已设为 36"
          else
            echo "错误: 未能把 compileSdk 设为 36" ; grep -n compileSdk "$F" ; exit 1
          fi

      - name: 获取依赖
        run: flutter pub get

      - name: 修补插件 compileSdk 到 36(直接改 pub 缓存里的插件)
        run: |
          CACHE="${PUB_CACHE:-$HOME/.pub-cache}"
          echo "pub 缓存目录: $CACHE"
          patched=0
          # 遍历所有插件的 android 构建文件(.gradle 与 .gradle.kts),
          # 把写死的 compileSdk 30~35 统一提升到 36。直接改源文件,不受 gradle 评估时机影响。
          while IFS= read -r -d '' f; do
            if grep -qE "compileSdk(Version)?[[:space:]=]+.*3[0-5]" "$f"; then
              echo "----- 修补前: $f -----"
              grep -nE "compileSdk" "$f" || true
              sed -i -E \
                -e 's/(compileSdkVersion[[:space:]]+)3[0-5]/\136/g' \
                -e 's/(compileSdk[[:space:]]+)3[0-5]/\136/g' \
                -e 's/(compileSdk[[:space:]]*=[[:space:]]*)3[0-5]/\136/g' \
                "$f"
              echo "----- 修补后: $f -----"
              grep -nE "compileSdk" "$f" || true
              patched=$((patched+1))
            fi
          done < <(find "$CACHE" \( -path "*/android/build.gradle" -o -path "*/android/build.gradle.kts" \) -print0 2>/dev/null)
          echo "共修补 $patched 个插件构建文件"

      - name: 构建 Release APK
        run: flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: speak-reader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
