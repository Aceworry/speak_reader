name: Build Android APK

# 手动触发,或推送到 main 分支时自动打包
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 补齐脚手架文件(图标/wrapper/gradle 等)
        run: flutter create --org com.example --project-name speak_reader --platforms=android .

      - name: 还原自定义配置(依赖、权限、业务代码)
        run: |
          git checkout -- pubspec.yaml \
            android/app/src/main/AndroidManifest.xml \
            lib
          rm -f test/widget_test.dart 2>/dev/null || true

      - name: 调整 app 构建配置(compileSdk 36 + 关闭混淆)
        run: |
          F=android/app/build.gradle.kts
          echo "===== 原始 build.gradle.kts ====="
          cat "$F"
          # 宽松匹配 compileSdk 的多种写法(= 34 / = flutter.compileSdkVersion / 函数式)
          sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*[A-Za-z0-9._()]+/compileSdk = 36/' "$F"
          sed -i -E 's/compileSdkVersion[[:space:]]*\([^)]*\)/compileSdk = 36/' "$F"
          # 关闭 R8 混淆与资源压缩(避免 ML Kit 类缺失);已存在则不重复插入
          grep -q "isMinifyEnabled" "$F" || \
            sed -i '/signingConfig = signingConfigs.getByName("debug")/a\            isMinifyEnabled = false\n            isShrinkResources = false' "$F"
          echo "===== 修改后 build.gradle.kts ====="
          cat "$F"
          echo "===== 校验 compileSdk ====="
          if grep -qE "compileSdk[[:space:]]*=[[:space:]]*36" "$F"; then
            echo "OK: compileSdk 已设为 36"
          else
            echo "错误: 未能把 compileSdk 设为 36" ; grep -n compileSdk "$F" ; exit 1
          fi

      - name: 强制所有插件子模块使用 compileSdk 36
        run: |
          # file_picker 等插件在自身构建文件里写死了 compileSdk 34,
          # 需在项目级 gradle 用 subprojects 统一覆盖为 36。
          if [ -f android/build.gradle.kts ]; then
            cat >> android/build.gradle.kts <<'EOF'

subprojects {
    afterEvaluate {
        val androidExt = extensions.findByName("android")
        if (androidExt is com.android.build.gradle.BaseExtension) {
            androidExt.compileSdkVersion(36)
        }
    }
}
EOF
            echo "已向 android/build.gradle.kts 追加 subprojects 覆盖"
          elif [ -f android/build.gradle ]; then
            cat >> android/build.gradle <<'EOF'

subprojects {
    afterEvaluate { p ->
        if (p.hasProperty("android")) {
            p.android {
                compileSdkVersion 36
            }
        }
    }
}
EOF
            echo "已向 android/build.gradle 追加 subprojects 覆盖"
          else
            echo "错误: 未找到项目级 gradle 文件" ; ls android ; exit 1
          fi

      - name: 获取依赖
        run: flutter pub get

      - name: 构建 Release APK
        run: flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: speak-reader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
