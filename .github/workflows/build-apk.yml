name: Build Android APK

# 手动触发,或推送到 main 分支时自动打包
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 补齐脚手架文件(图标/wrapper/gradle 等)
        run: flutter create --org com.example --project-name speak_reader --platforms=android .

      - name: 还原自定义配置(依赖、权限、业务代码、app 构建配置)
        run: |
          git checkout -- pubspec.yaml \
            android/app/src/main/AndroidManifest.xml \
            android/app/build.gradle.kts \
            lib
          # 删除可能并存的 Groovy 版 app build 文件,确保用我们的 .kts
          rm -f android/app/build.gradle 2>/dev/null || true
          rm -f test/widget_test.dart 2>/dev/null || true

      - name: 获取依赖
        run: flutter pub get

      - name: 构建 Release APK
        run: flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: speak-reader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
