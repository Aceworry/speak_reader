name: Build Android APK

# 手动触发,或推送到 main 分支时自动打包
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 补齐脚手架文件(图标/wrapper/gradle 等)
        run: flutter create --org com.example --project-name speak_reader --platforms=android .

      - name: 还原自定义配置(依赖、权限、业务代码)
        run: |
          git checkout -- pubspec.yaml \
            android/app/src/main/AndroidManifest.xml \
            lib
          rm -f test/widget_test.dart 2>/dev/null || true

      - name: 调整 app 构建配置(compileSdk 36 + 关闭混淆)
        run: |
          F=android/app/build.gradle.kts
          # 把 compileSdk 提到 36(file_picker 等依赖要求)
          sed -i 's/compileSdk = .*/compileSdk = 36/' "$F"
          # 在 release 块的签名配置后关闭 R8 混淆与资源压缩(避免 ML Kit 类缺失)
          sed -i '/signingConfig = signingConfigs.getByName("debug")/a\            isMinifyEnabled = false\n            isShrinkResources = false' "$F"
          echo "===== 修改后的 build.gradle.kts ====="
          cat "$F"

      - name: 获取依赖
        run: flutter pub get

      - name: 构建 Release APK
        run: flutter build apk --release

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: speak-reader-apk
          path: build/app/outputs/flutter-apk/app-release.apk
